<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syndicate Portal Pro</title>
    <script src="https://telegram.org"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --tg-theme-bg-color: #ffffff; --tg-theme-text-color: #000000; }
        body { background-color: var(--tg-theme-bg-color, #f4f4f9); color: var(--tg-theme-text-color, #222); font-family: -apple-system, sans-serif; height: 100vh; padding-bottom: 160px; }
        .card { background-color: #efeff4; border-radius: 16px; }
        .floating-debug { 
            position: fixed; 
            bottom: 10px; 
            left: 10px; 
            right: 10px; 
            background: rgba(0,0,0,0.95); 
            color: #00ff00; 
            font-family: monospace; 
            font-size: 11px; 
            padding: 12px; 
            border-radius: 12px; 
            border: 3px solid #00ff00; 
            z-index: 9999; 
            max-height: 140px; 
            overflow-y: auto; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-4">

    <!-- TOP SYNC BAR -->
    <div id="sync-header" class="mb-6 p-4 card border-2 border-blue-500">
        <h2 class="text-sm font-black mb-2 uppercase tracking-tighter">Connection Settings</h2>
        <input type="url" id="api-url-input" placeholder="Paste /exec URL here..." class="w-full p-4 rounded-xl text-sm border-2 border-gray-100 mb-3 outline-none focus:border-blue-500">
        <button id="connect-btn" onclick="saveAndSync()" class="w-full bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all">CONNECT DASHBOARD</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Syndicate <span class="opacity-30">V7.1</span></h1>
            <button onclick="hardReset()" class="text-[10px] bg-red-100 text-red-500 px-3 py-1 rounded-full font-bold">HARD RESET</button>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Trades</p><p class="text-xl font-black" id="stat-total">0</p></div>
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Win %</p><p class="text-xl font-black text-green-500" id="stat-winrate">0%</p></div>
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Pips</p><p class="text-xl font-black" id="stat-pips">0</p></div>
        </div>
        <div class="card p-5 mb-6"><div id="chart-container" style="height: 180px;"></div></div>
        <div id="signal-list" class="space-y-4"></div>
    </div>

    <!-- FLOATING DEBUG CONSOLE -->
    <div id="debug-log" class="floating-debug">
        <div>> System V7.1 Initialized</div>
        <div>> Validator: Strict URL Check</div>
        <div>> Waiting for URL...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        let chart, lineSeries, apiUrl = "";
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "LOCAL_TEST";

        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            const console = document.getElementById('debug-log');
            console.appendChild(div);
            console.scrollTop = console.scrollHeight;
        }

        function hardReset() {
            log("Wiping all settings...");
            tg.CloudStorage.removeItems(['api_url'], () => {
                location.reload();
            });
        }

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: 'transparent' } },
                grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(0,0,0,0.05)' } },
                rightPriceScale: { borderVisible: false }, timeScale: { borderVisible: false }
            });
            lineSeries = chart.addLineSeries({ color: '#2481cc', lineWidth: 4 });
        }

        async function saveAndSync() {
            const input = document.getElementById('api-url-input');
            // NUCLEAR CLEANER: REMOVE ALL NON-PRINTABLE AND WHITESPACE CHARACTERS
            let rawUrl = input.value;
            let url = rawUrl.replace(/[\s\u200B-\u200D\uFEFF]/g, '').trim(); 
            
            input.value = url;
            input.blur();

            log(`Validating: ${url.substring(0, 35)}...`);

            try {
                const testUrl = new URL(url);
                if (!testUrl.protocol.startsWith('https')) {
                    log("FAIL: HTTPS Required.");
                    tg.showAlert("Use an HTTPS URL!");
                    return;
                }
            } catch (e) {
                log(`PATTERN FAIL: ${e.message}`);
                tg.showAlert("Invalid URL pattern. Check for missing 'https://' or typos.");
                return;
            }

            if (!url.includes("/exec")) { 
                log("FAIL: Must end in /exec");
                tg.showAlert("Use the URL ending in /exec!"); 
                return; 
            }

            const btn = document.getElementById('connect-btn');
            btn.innerText = "CONNECTING...";
            log("Pinging Google Cloud...");

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                // ADDING CACHE-BUSTER TO THE PING
                const response = await fetch(`${url}?check=ping&t=${Date.now()}`, { signal: controller.signal });
                const data = await response.json();
                clearTimeout(timeoutId);
                
                if (data.status === "online") {
                    log(`SUCCESS: Connected to ${data.version}`);
                    tg.CloudStorage.setItem('api_url', url, (err, success) => {
                        apiUrl = url;
                        refreshData();
                    });
                }
            } catch (err) {
                log(`CRITICAL: ${err.message}`);
                if (err.name === 'AbortError') log("TIMEOUT: Server is busy.");
                tg.showAlert("Check 'Anyone' access and ensure the Script is Deployed correctly.");
                btn.innerText = "RETRY";
            }
        }

        async function refreshData() {
            log("Syncing Trades...");
            try {
                const response = await fetch(`${apiUrl}?userId=${userId}&t=${Date.now()}`);
                const data = await response.json();
                if (data.authorized === false) { 
                    log("DENIED: Join the channel!");
                    tg.showAlert("Join the channel first!"); 
                    return; 
                }
                
                document.getElementById('sync-header').style.display = "none";
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('stat-total').innerText = data.stats.totalTrades;
                document.getElementById('stat-winrate').innerText = data.stats.winRate;
                document.getElementById('stat-pips').innerText = data.stats.totalPips;
                
                const list = document.getElementById('signal-list');
                list.innerHTML = "";
                data.recentSignals.forEach(sig => {
                    const card = document.createElement('div');
                    card.className = "card p-5 flex justify-between items-center";
                    const pipsColor = parseFloat(sig.pips) >= 0 ? "text-green-500" : "text-red-500";
                    card.innerHTML = `<div><p class="text-[10px] font-black opacity-30">${sig.provider}</p><p class="font-bold text-sm uppercase">${sig.side} GOLD @ ${sig.entry}</p></div><div class="text-right"><p class="text-xl font-black ${pipsColor}">${sig.pips}</p></div>`;
                    list.appendChild(card);
                });
                log("Audit Dashboard Live.");
            } catch (err) { 
                log(`SYNC FAIL: ${err.message}`);
            }
        }

        window.onload = () => {
            initChart();
            tg.CloudStorage.getItem('api_url', (err, value) => {
                if (value) { 
                    log("Restoring settings...");
                    apiUrl = value; 
                    document.getElementById('api-url-input').value = value;
                    refreshData(); 
                }
            });
        };
    </script>
</body>
</html>
