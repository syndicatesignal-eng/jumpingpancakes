<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syndicate Portal Pro</title>
    <script src="https://telegram.org"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --tg-theme-bg-color: #ffffff; --tg-theme-text-color: #000000; --tg-theme-button-color: #2481cc; }
        body { background-color: var(--tg-theme-bg-color, #f4f4f9); color: var(--tg-theme-text-color, #222); font-family: -apple-system, sans-serif; height: 100vh; overflow-y: auto; }
        .card { background-color: #efeff4; border-radius: 16px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 28px; padding: 28px; width: 100%; max-width: 400px; margin-top: 10vh; }
        input:focus { border-color: #2481cc; ring: 2px; }
    </style>
</head>
<body class="p-4 pb-20">

    <!-- SYNC SCREEN (Initial State) -->
    <div id="sync-screen" class="flex flex-col items-center justify-center min-h-[80vh] text-center p-6">
        <div class="bg-blue-50 p-6 rounded-full mb-6">
            <svg class="w-16 h-16 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h2 class="text-2xl font-black mb-2">Sync Dashboard</h2>
        <p class="text-sm opacity-60 mb-10">Paste your Google Script URL below to load your trading data.</p>
        <input type="url" id="api-url-main" placeholder="https://script.google.com/..." class="w-full border-2 border-gray-100 p-5 rounded-2xl mb-4 text-sm outline-none">
        <button onclick="saveAndSync()" id="sync-btn" class="w-full bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform">CONNECT DASHBOARD</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Syndicate <span class="opacity-30">V6.5</span></h1>
            <button onclick="toggleSettings()" class="p-3 card"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg></button>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Trades</p><p class="text-xl font-black" id="stat-total">0</p></div>
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Win %</p><p class="text-xl font-black text-green-500" id="stat-winrate">0%</p></div>
            <div class="card p-4 text-center"><p class="text-[10px] opacity-40 font-bold uppercase">Pips</p><p class="text-xl font-black" id="stat-pips">0</p></div>
        </div>
        <div class="card p-5 mb-6"><div id="chart-container" style="height: 180px;"></div></div>
        <div id="signal-list" class="space-y-4"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        let chart, lineSeries, apiUrl = "";
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "LOCAL_TEST";

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: 'transparent' } },
                grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(0,0,0,0.05)' } },
                rightPriceScale: { borderVisible: false }, timeScale: { borderVisible: false }
            });
            lineSeries = chart.addLineSeries({ color: '#2481cc', lineWidth: 4 });
        }

        function saveAndSync() {
            const input = document.getElementById('api-url-main').value.trim();
            if (!input.includes("/exec")) { tg.showAlert("Invalid URL! Ensure it ends in /exec."); return; }
            const btn = document.getElementById('sync-btn');
            btn.innerText = "CONNECTING...";
            
            // USE CLOUD STORAGE FOR 2026 PERMANENCE
            tg.CloudStorage.setItem('api_url', input, (err, success) => {
                apiUrl = input;
                refreshData();
            });
        }

        async function refreshData() {
            if (!apiUrl) return;
            try {
                const response = await fetch(`${apiUrl}?userId=${userId}`);
                const data = await response.json();
                if (data.authorized === false) { tg.showAlert("Membership Required! Join the channel first."); return; }
                
                document.getElementById('sync-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('stat-total').innerText = data.stats.totalTrades;
                document.getElementById('stat-winrate').innerText = data.stats.winRate;
                document.getElementById('stat-pips').innerText = data.stats.totalPips;
                
                const list = document.getElementById('signal-list');
                list.innerHTML = "";
                data.recentSignals.forEach(sig => {
                    const card = document.createElement('div');
                    card.className = "card p-5 flex justify-between items-center";
                    const pipsColor = parseFloat(sig.pips) >= 0 ? "text-green-500" : "text-red-500";
                    card.innerHTML = `<div><p class="text-[10px] font-black opacity-30">${sig.provider}</p><p class="font-bold text-sm uppercase">${sig.side} GOLD @ ${sig.entry}</p></div><div class="text-right"><p class="text-xl font-black ${pipsColor}">${sig.pips}</p></div>`;
                    list.appendChild(card);
                });
                
                const chartData = data.recentSignals.filter(s => s.status.includes("Closed")).map(s => ({ time: new Date(s.date).getTime()/1000, value: parseFloat(s.pips) })).sort((a,b) => a.time - b.time);
                if (chartData.length > 0) {
                    let cumulative = 0;
                    lineSeries.setData(chartData.map(d => { cumulative += d.value; return { time: d.time, value: cumulative }; }));
                    chart.timeScale().fitContent();
                }
            } catch (err) { 
                tg.showAlert("Sync Failed! Check your Apps Script Deployment settings."); 
                document.getElementById('sync-btn').innerText = "RETRY CONNECTION";
            }
        }

        window.onload = () => {
            initChart();
            tg.CloudStorage.getItem('api_url', (err, value) => {
                if (value) { apiUrl = value; refreshData(); }
            });
        };
    </script>
</body>
</html
